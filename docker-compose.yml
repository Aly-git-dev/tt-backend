
version: "3.9"

services:
  api:
    build: .
    container_name: upiiz_api
    ports:
      - "3021:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/upiiz_platform
      SPRING_DATASOURCE_USERNAME: upiiz
      SPRING_DATASOURCE_PASSWORD: upiizpass
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: upiiz_db
    environment:
      POSTGRES_DB: upiiz_platform
      POSTGRES_USER: upiiz
      POSTGRES_PASSWORD: upiizpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: upiiz_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@upiiz.mx
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: upiiz_mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  db_data:
