server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/upiiz_platform}
    username: ${SPRING_DATASOURCE_USERNAME:upiiz}
    password: ${SPRING_DATASOURCE_PASSWORD:upiizpass}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://148.204.142.20:3030}

  security:
    jwt:
      issuer: upiiz-platform
      access-exp-min: 15
      refresh-exp-days: 14
      secret: ${JWT_SECRET:dev-secret-key-para-local-cambiar-en-produccion}

  gesco:
    enabled: true
    base-url: "http://148.204.142.2/pump/web/index.php/login"
    token: ${TOKEN:}
    timeout-ms: 5000

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

chat:
  storage:
    baseDir: ${CHAT_STORAGE_BASE_DIR:./data/chat-uploads}
    maxBytes: ${CHAT_STORAGE_MAX_BYTES:104857600}