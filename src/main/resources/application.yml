server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  frontend:
    url: ${APP_FRONTEND_URL:https://app.kalypi.xyz}

  security:
    jwt:
      issuer: upiiz-platform
      access-exp-min: ${JWT_ACCESS_EXP_MIN:15}
      refresh-exp-days: ${JWT_REFRESH_EXP_DAYS:14}
      secret: ${JWT_SECRET}

  gesco:
    enabled: ${GESCO_ENABLED:true}
    base-url: ${GESCO_BASE_URL:http://148.204.142.2/pump/web/index.php/login}
    token: ${TOKEN:}
    timeout-ms: ${GESCO_TIMEOUT_MS:5000}

  push:
    subject: mailto:upiiz.notificaciones@gmail.com
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}

chat:
  storage:
    baseDir: ${CHAT_STORAGE_BASE_DIR:/app/data/chat-uploads}
    maxBytes: ${CHAT_STORAGE_MAX_BYTES:104857600}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
